<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>merlint dashboard</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --dim: #8b949e; --accent: #7c3aed;
  --green: #3fb950; --yellow: #d29922; --red: #f85149;
  --purple: #a371f7;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:13px; }
.header { display:flex; align-items:center; gap:16px; padding:20px 24px 12px; border-bottom:1px solid var(--border); }
.logo { width:48px; height:48px; image-rendering:pixelated; }
.title { font-size:20px; font-weight:700; color:#fff; }
.title span { color:var(--accent); }
.subtitle { color:var(--dim); font-size:12px; }
.uptime { margin-left:auto; color:var(--dim); font-size:12px; }
.uptime b { color:var(--green); }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; padding:20px 24px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; }
.card h3 { font-size:12px; text-transform:uppercase; color:var(--dim); letter-spacing:1px; margin-bottom:12px; }
.stat-row { display:flex; justify-content:space-between; margin-bottom:8px; }
.stat-label { color:var(--dim); }
.stat-value { color:#fff; font-weight:600; }
.stat-value.green { color:var(--green); }
.stat-value.purple { color:var(--purple); }
.bar-bg { height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin:4px 0; }
.bar-fill { height:100%; border-radius:4px; transition:width 0.6s ease; }
.bar-fill.green { background:linear-gradient(90deg,var(--green),#2ea043); }
.bar-fill.purple { background:linear-gradient(90deg,var(--accent),var(--purple)); }
.sessions-list { max-height:320px; overflow-y:auto; }
.session { border:1px solid var(--border); border-radius:6px; padding:10px 12px; margin-bottom:8px; }
.session-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.session-key { font-family:monospace; font-size:11px; color:var(--purple); }
.badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }
.badge.paused { background:rgba(63,185,80,.15); color:var(--green); }
.badge.active { background:rgba(124,58,237,.15); color:var(--purple); }
.session-stats { display:flex; gap:16px; font-size:11px; color:var(--dim); }
.session-stats b { color:var(--text); }
.events-list { max-height:240px; overflow-y:auto; font-size:11px; }
.event { padding:4px 0; border-bottom:1px solid var(--border); display:flex; gap:8px; }
.event:last-child { border-bottom:none; }
.event-time { color:var(--dim); min-width:56px; }
.event-kind { min-width:64px; font-weight:600; }
.event-kind.optimize { color:var(--green); }
.event-kind.session { color:var(--yellow); }
.event-msg { color:var(--text); word-break:break-all; }
.activity-list { max-height:200px; overflow-y:auto; font-size:11px; }
.activity { padding:3px 0; display:flex; gap:8px; border-bottom:1px solid var(--border); }
.activity:last-child { border-bottom:none; }
.pulse { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.shimmer { background:linear-gradient(90deg,var(--accent),var(--purple),var(--accent)); background-size:200% 100%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:shimmer 3s linear infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.refresh-indicator { font-size:10px; color:var(--dim); padding:8px 24px; text-align:right; }
</style>
</head>
<body>

<div class="grid">
  <div class="card">
    <h3>Overview</h3>
    <div class="stat-row"><span class="stat-label">Total Requests</span><span class="stat-value" id="total-req">0</span></div>
    <div class="stat-row"><span class="stat-label">Active Sessions</span><span class="stat-value purple" id="session-count">0</span></div>
    <div class="stat-row"><span class="stat-label">Tokens Saved</span><span class="stat-value green" id="total-saved">0</span></div>
    <div class="stat-row"><span class="stat-label">Est. Cost Saved</span><span class="stat-value green" id="cost-saved">$0.00</span></div>
    <div style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:2px">
        <span>Optimization progress</span><span id="opt-pct">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill green" id="opt-bar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="card">
    <h3>Sessions</h3>
    <div class="sessions-list" id="sessions"></div>
  </div>

  <div class="card">
    <h3>Events</h3>
    <div class="events-list" id="events"></div>
  </div>

  <div class="card">
    <h3>Activity</h3>
    <div class="activity-list" id="activity"></div>
  </div>
</div>

<div class="refresh-indicator">auto-refresh every 2s</div>

<!-- Logo served inline as emoji fallback; replace src with your SVG data URI -->

<script>
function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'k';
  return n.toString();
}
function fmtTime(s) {
  if (s < 60) return s+'s';
  if (s < 3600) return Math.floor(s/60)+'m '+s%60+'s';
  return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';
}

async function refresh() {
  try {
    const r = await fetch('/merlint/status');
    const d = await r.json();

    document.getElementById('uptime').textContent = fmtTime(d.uptime_secs);
    document.getElementById('total-req').textContent = d.total_requests;
    document.getElementById('session-count').textContent = d.session_count;

    const totalSaved = d.sessions.reduce((a,s) => a + (s.tokens_saved > 0 ? s.tokens_saved : 0), 0);
    document.getElementById('total-saved').textContent = fmt(totalSaved);
    document.getElementById('cost-saved').textContent = '$'+(totalSaved * 0.000004).toFixed(4);

    const pct = Math.min(100, Math.round(totalSaved / 1000));
    document.getElementById('opt-pct').textContent = pct+'%';
    document.getElementById('opt-bar').style.width = pct+'%';

    // Sessions
    const sc = document.getElementById('sessions');
    sc.innerHTML = d.sessions.map(s => {
      const key = s.key.length > 20 ? s.key.slice(0,20)+'...' : s.key;
      const badge = s.pruning_suspended
        ? '<span class="badge paused">CACHE</span>'
        : '<span class="badge active">PRUNE</span>';
      return `<div class="session">
        <div class="session-header"><span class="session-key">${key}</span>${badge}</div>
        <div class="session-stats">
          <span>reqs <b>${s.request_count}</b></span>
          <span>saved <b style="color:var(--green)">${fmt(s.tokens_saved > 0 ? s.tokens_saved : 0)}</b></span>
          <span>tools <b>${s.tools_tracked}</b></span>
          <span>cache <b>${s.api_cache_hit_rate}%</b></span>
        </div>
      </div>`;
    }).join('');

    // Events
    const ev = document.getElementById('events');
    ev.innerHTML = (d.events||[]).map(e => {
      const cls = e.kind === 'optimize' ? 'optimize' : 'session';
      return `<div class="event">
        <span class="event-time">${e.time}</span>
        <span class="event-kind ${cls}">${e.kind}</span>
        <span class="event-msg">${e.message}</span>
      </div>`;
    }).join('');

    // Activity
    const ac = document.getElementById('activity');
    ac.innerHTML = (d.activity||[]).map(a => {
      const saved = a.tokens_saved ? `<span style="color:var(--green)">-${fmt(a.tokens_saved)}</span>` : '';
      return `<div class="activity">
        <span style="color:var(--dim);min-width:56px">${a.time}</span>
        <span style="min-width:32px">${a.status}</span>
        <span style="min-width:48px">${a.latency_ms}ms</span>
        ${saved}
      </div>`;
    }).join('');

  } catch(e) { console.error('refresh failed', e); }
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
